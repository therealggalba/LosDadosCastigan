<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego 3000</title>
  <link rel="stylesheet" href="./app.css">
</head>
<body>
    <div id="setup-screen">
        <h1>Dados - 3000</h1>
        <div id="player-config"></div>
        <div id="setup-buttons">
            <button id="add-player">Añadir jugador</button>
            <button id="remove-player">Eliminar jugador</button>
            <button id="start-game">Nueva partida</button>
        </div>
        <div id="record-display"></div>
    </div>

  <div id="game-screen" class="hidden">
    <div id="dice-area">
      <h2>Tapete de juego</h2>
      <div id="dice-container"></div>
      <button id="roll-dice">Lanzar dados</button>
    </div>

    <div id="scoreboard">
      <div id="scoreboard-header">
        <h2>Tabla de puntuaciones</h2>
        <div id="round-counter">Ronda: 1</div>
      </div>
      <table id="score-table">
        <thead>
          <tr>
            <th>Pos.</th>
            <th>Nombre</th>
            <th>Color</th>
            <th>Pts Ronda</th>
            <th>Pts Totales</th>
            <th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="sudden-death-banner" class="hidden"></div>

  </div>

<script src="./app.js"></script>
</body>
</html>
